# Newsletter diario de IA: recolecta fuentes, cura con OpenAI y envía por Resend.
name: AI Daily Digest

on:
  schedule:
    # GitHub Actions usa UTC. 11:00 UTC ≈ 08:00 Argentina (UTC-3).
    - cron: "0 11 * * *"
  workflow_dispatch:        # permite dispararlo a mano desde la pestaña Actions

jobs:
  send-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-digest/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar y enviar digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python main.py
